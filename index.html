<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For Laiba ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#030014; }
  body { font-family:'Inter',sans-serif; color:#fff; }
  #canvas { position:fixed; inset:0; display:block; }

  .overlay { position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; z-index:10;
    padding:24px; pointer-events:none; }
  .overlay.active { pointer-events:auto; }

  /* ---- Intro ---- */
  #intro { background:radial-gradient(ellipse at center, #0a0530 0%, #030014 70%); transition:opacity 2s ease; }
  #intro h1 { font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(2.2rem,8vw,4.5rem);
    letter-spacing:.35em; margin-left:.35em; opacity:0; animation:fadeUp 2.5s ease .5s forwards; }
  #intro p { margin-top:22px; font-weight:300; font-size:.85rem; letter-spacing:.3em; text-transform:uppercase;
    color:#b9b3ff; opacity:0; animation:fadeUp 2.5s ease 1.6s forwards; }
  #enterBtn { margin-top:52px; padding:15px 46px; border:1px solid rgba(255,255,255,.35); border-radius:50px;
    background:transparent; color:#fff; font-family:'Inter',sans-serif; font-size:.8rem; letter-spacing:.35em;
    text-transform:uppercase; cursor:pointer; opacity:0; animation:fadeUp 2s ease 2.8s forwards, breathe 3s ease 3s infinite;
    transition:background .4s, border-color .4s; }
  #enterBtn:hover { background:rgba(255,255,255,.08); border-color:#fff; }
  @keyframes fadeUp { from{opacity:0; transform:translateY(24px)} to{opacity:1; transform:translateY(0)} }
  @keyframes breathe { 0%,100%{box-shadow:0 0 0 0 rgba(185,179,255,0)} 50%{box-shadow:0 0 34px 2px rgba(185,179,255,.25)} }

  /* ---- Hint text ---- */
  #hint { position:fixed; bottom:40px; left:0; right:0; text-align:center; z-index:9;
    font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(1rem,4vw,1.35rem);
    color:rgba(255,255,255,.75); opacity:0; transition:opacity 1.5s; pointer-events:none;
    text-shadow:0 0 20px rgba(120,110,255,.6); padding:0 20px; }

  /* ---- Star message ---- */
  #starMsg { position:fixed; top:16%; left:0; right:0; text-align:center; z-index:9;
    font-family:'Cormorant Garamond',serif; font-size:clamp(1.4rem,5.5vw,2.4rem); font-style:italic;
    color:#fff; opacity:0; transition:opacity 1.2s; pointer-events:none;
    text-shadow:0 0 30px rgba(255,200,240,.8); padding:0 24px; }

  /* ---- Country card ---- */
  #card { position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(30px);
    width:min(92vw,420px); background:rgba(10,8,40,.72); backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.14); border-radius:22px; padding:26px 28px; z-index:11;
    opacity:0; transition:opacity .6s, transform .6s; pointer-events:none; text-align:center; }
  #card.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
  #card .flag { font-size:2.6rem; line-height:1; }
  #card .cname { margin-top:6px; font-size:.72rem; letter-spacing:.32em; text-transform:uppercase; color:#b9b3ff; }
  #card .phrase { font-family:'Cormorant Garamond',serif; font-size:clamp(1.7rem,6vw,2.3rem); margin-top:12px; }
  #card .pron { margin-top:6px; font-style:italic; color:rgba(255,255,255,.65); font-size:.95rem; }
  #card .trans { margin-top:10px; font-size:.8rem; letter-spacing:.22em; text-transform:uppercase; color:#ff9ecb; }
  #card .speak { margin-top:16px; background:none; border:1px solid rgba(255,255,255,.3); color:#fff;
    border-radius:40px; padding:9px 26px; font-size:.75rem; letter-spacing:.25em; cursor:pointer; }

  /* ---- Progress ---- */
  #progress { position:fixed; top:22px; left:0; right:0; text-align:center; z-index:9; font-size:.72rem;
    letter-spacing:.3em; text-transform:uppercase; color:rgba(255,255,255,.55); opacity:0; transition:opacity 1s;
    pointer-events:none; }

  /* ---- Mute ---- */
  #mute { position:fixed; top:16px; right:16px; z-index:20; width:42px; height:42px; border-radius:50%;
    background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.2); color:#fff; cursor:pointer;
    font-size:1rem; display:none; align-items:center; justify-content:center; }

  /* ---- Finale ---- */
  #finale { z-index:15; opacity:0; transition:opacity 3s; }
  #finale .line { font-family:'Cormorant Garamond',serif; font-size:clamp(1.5rem,5.5vw,2.6rem);
    line-height:1.7; opacity:0; transform:translateY(20px); }
  #finale .big { font-size:clamp(2.4rem,9vw,4.6rem); font-style:italic;
    background:linear-gradient(90deg,#ffb3d9,#b9b3ff,#9fd8ff); -webkit-background-clip:text;
    background-clip:text; color:transparent; }
  #credits { position:fixed; inset:0; z-index:16; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:18px; opacity:0; pointer-events:none; transition:opacity 3s; text-align:center; }
  #credits .c1 { font-size:.7rem; letter-spacing:.4em; text-transform:uppercase; color:rgba(255,255,255,.5); }
  #credits .c2 { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-style:italic; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="intro" class="overlay active">
  <h1>LAIBA</h1>
  <p>a universe was made for you</p>
  <button id="enterBtn">Begin</button>
</div>

<div id="hint"></div>
<div id="starMsg"></div>
<div id="progress"></div>
<button id="mute">♪</button>

<div id="card">
  <div class="flag"></div>
  <div class="cname"></div>
  <div class="phrase"></div>
  <div class="pron"></div>
  <div class="trans"></div>
  <button class="speak">✦ &nbsp;Hear it</button>
</div>

<div id="finale" class="overlay">
  <div class="line" id="f1">Laiba…</div>
  <div class="line" id="f2">No matter what language the world speaks…</div>
  <div class="line" id="f3">my heart will always say the same thing.</div>
  <div class="line big" id="f4">I love you. Forever.</div>
</div>

<div id="credits">
  <div class="c1">Written · Directed · Built</div>
  <div class="c2">with all my heart, for you</div>
  <div class="c1" style="margin-top:30px">✦</div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
/* ================================================================
   FOR LAIBA — a tiny universe in one file
   Chapters: SKY (constellation) → GLOBE (languages) → FINALE (heart)
   ================================================================ */

const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
const isMobile = /Mobi|Android/i.test(navigator.userAgent);

/* ---------- Languages: country, flag, phrase, pronunciation, BCP-47 ---------- */
const LOVE = [
  ["Pakistan","🇵🇰","میں تم سے محبت کرتا ہوں","Main tumse mohabbat karta hoon","ur-PK",30,70],
  ["France","🇫🇷","Je t'aime","zhuh tem","fr-FR",46,2],
  ["Italy","🇮🇹","Ti amo","tee AH-mo","it-IT",42,12],
  ["Spain","🇪🇸","Te quiero","teh KYEH-ro","es-ES",40,-4],
  ["Japan","🇯🇵","愛してる","Aishiteru","ja-JP",36,138],
  ["Korea","🇰🇷","사랑해","Saranghae","ko-KR",36,128],
  ["China","🇨🇳","我爱你","Wǒ ài nǐ","zh-CN",35,104],
  ["Turkey","🇹🇷","Seni seviyorum","seh-NEE seh-vee-YO-room","tr-TR",39,35],
  ["Germany","🇩🇪","Ich liebe dich","ish LEE-buh dish","de-DE",51,10],
  ["Russia","🇷🇺","Я тебя люблю","Ya tebya lyublyu","ru-RU",56,38],
  ["Brazil","🇧🇷","Eu te amo","eh-oo chee AH-mo","pt-BR",-10,-52],
  ["Egypt","🇪🇬","أنا بحبك","Ana bahebak","ar-EG",27,30],
  ["India","🇮🇳","मैं तुमसे प्यार करता हूँ","Main tumse pyaar karta hoon","hi-IN",22,78],
  ["Greece","🇬🇷","Σ'αγαπώ","S'agapo","el-GR",39,22],
  ["Netherlands","🇳🇱","Ik hou van jou","ik how fan yow","nl-NL",52,5],
  ["Sweden","🇸🇪","Jag älskar dig","yog EL-skar day","sv-SE",62,15],
  ["Poland","🇵🇱","Kocham cię","KO-ham chyeh","pl-PL",52,19],
  ["Vietnam","🇻🇳","Anh yêu em","ang yeu em","vi-VN",16,106],
  ["Thailand","🇹🇭","ฉันรักคุณ","Chan rak khun","th-TH",15,101],
  ["Indonesia","🇮🇩","Aku cinta kamu","AH-koo CHIN-tah KAH-moo","id-ID",-2,118],
  ["Iran","🇮🇷","دوستت دارم","Dooset daram","fa-IR",32,53],
  ["Mexico","🇲🇽","Te amo","teh AH-mo","es-MX",23,-102],
  ["Canada","🇨🇦","I love you","I love you","en-CA",56,-106],
  ["USA","🇺🇸","I love you","I love you","en-US",39,-98],
  ["UK","🇬🇧","I love you","I love you","en-GB",54,-2],
  ["Kenya","🇰🇪","Nakupenda","nah-koo-PEN-dah","sw-KE",0,38],
  ["Nigeria","🇳","Mo nifẹ rẹ","mo NEE-feh reh","yo-NG",9,8],
  ["Philippines","🇵🇭","Mahal kita","mah-HAL kee-TAH","fil-PH",13,122],
  ["Australia","🇦🇺","I love you","I love you","en-AU",-25,134],
  ["Finland","🇫🇮","Minä rakastan sinua","MEE-na RAH-kas-tan SEE-noo-ah","fi-FI",64,26],
];
const UNLOCK_AT = 8; // countries needed to trigger finale

/* ---------- Renderer / scene ---------- */
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x030014, 0.012);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, .1, 400);
camera.position.set(0,0,30);

scene.add(new THREE.AmbientLight(0x8877ff, .5));
const key = new THREE.DirectionalLight(0xfff2e0, 1.4); key.position.set(5,3,5); scene.add(key);

/* soft round sprite texture (shared) */
function glowTex(inner='255,255,255', outer='120,110,255'){
  const c = document.createElement('canvas'); c.width=c.height=64;
  const g = c.getContext('2d');
  const grd = g.createRadialGradient(32,32,0,32,32,32);
  grd.addColorStop(0,`rgba(${inner},1)`); grd.addColorStop(.35,`rgba(${outer},.55)`);
  grd.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grd; g.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}
const TEX_STAR = glowTex();
const TEX_PINK = glowTex('255,220,240','255,120,190');
const TEX_GOLD = glowTex('255,240,200','255,190,90');

/* ================================================================
   CHAPTER 1 — NIGHT SKY
   ================================================================ */
const sky = new THREE.Group(); scene.add(sky);

/* background starfield */
{
  const N = isMobile?1400:2600, pos = new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r = 60+Math.random()*120, th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.sin(ph)*Math.sin(th); pos[i*3+2]=r*Math.cos(ph);
  }
  const g = new THREE.BufferGeometry(); g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  sky.add(new THREE.Points(g, new THREE.PointsMaterial({size:.9,map:TEX_STAR,transparent:true,
    depthWrite:false,blending:THREE.AdditiveBlending,color:0xbfc8ff})));
}

/* LAIBA constellation — hand-placed letter points (x,y) */
const LETTERS = {
  L:[[0,4],[0,2],[0,0],[1.4,0]],
  A:[[0,0],[0.8,2],[1.6,4],[2.4,2],[3.2,0],[0.8,2],[2.4,2]],
  I:[[0,0],[0,2],[0,4]],
  B:[[0,0],[0,2],[0,4],[1.4,3.4],[0.2,2],[1.4,.7]],
};
function buildName(){
  const seq = ['L','A','I','B','A'], pts=[]; let ox=0;
  for(const ch of seq){
    const L = LETTERS[ch];
    for(const [x,y] of L) pts.push([ox+x, y]);
    ox += (ch==='A'?4.4:(ch==='I'?1.6:2.8));
  }
  const w = ox; // center it
  return pts.map(([x,y])=>new THREE.Vector3((x-w/2)*1.15,(y-2)*1.15+3,-8));
}
const namePts = buildName();

/* clickable wish-stars (5 of them) */
const WISHES = [
  "The night I met you, the sky got jealous.",
  "Every star here is one reason I love you. There aren't enough stars.",
  "You are my favorite hello and my hardest goodbye.",
  "Somewhere between all these lights, my heart chose you.",
  "Keep touching the stars… they're spelling something.",
];
const wishStars = [];
{
  const spots = [[-12,5],[ -5,-4],[3,7],[9,-2],[13,4]];
  spots.forEach(([x,y],i)=>{
    const s = new THREE.Sprite(new THREE.SpriteMaterial({map:TEX_GOLD,transparent:true,
      depthWrite:false,blending:THREE.AdditiveBlending,opacity:.95}));
    s.position.set(x,y,-4); s.scale.setScalar(2.2); s.userData={i, clicked:false, base:2.2, ph:Math.random()*6};
    sky.add(s); wishStars.push(s);
  });
}

/* constellation lines + points (revealed progressively) */
const nameGroup = new THREE.Group(); nameGroup.visible=false; sky.add(nameGroup);
{
  namePts.forEach(p=>{
    const s = new THREE.Sprite(new THREE.SpriteMaterial({map:TEX_PINK,transparent:true,
      depthWrite:false,blending:THREE.AdditiveBlending,opacity:0}));
    s.position.copy(p); s.scale.setScalar(1.2); nameGroup.add(s);
  });
}

/* fireflies that chase the pointer */
const FLY_N = isMobile?40:90;
const flyGeom = new THREE.BufferGeometry();
const flyPos = new Float32Array(FLY_N*3), flyVel = new Float32Array(FLY_N*3);
for(let i=0;i<FLY_N;i++){ flyPos[i*3]=(Math.random()-.5)*30; flyPos[i*3+1]=(Math.random()-.5)*18; flyPos[i*3+2]=-2; }
flyGeom.setAttribute('position', new THREE.BufferAttribute(flyPos,3));
const flies = new THREE.Points(flyGeom, new THREE.PointsMaterial({size:1.1,map:TEX_GOLD,transparent:true,
  depthWrite:false,blending:THREE.AdditiveBlending,opacity:.9}));
sky.add(flies);

/* shooting stars */
const shooters = [];
function spawnShooter(){
  if(chapter!=='SKY' || REDUCED) return;
  const s = new THREE.Sprite(new THREE.SpriteMaterial({map:TEX_STAR,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
  s.position.set(-25+Math.random()*10, 12+Math.random()*4, -6); s.scale.setScalar(1.4);
  s.userData={vx:.35+Math.random()*.2, vy:-.18-Math.random()*.1, life:1};
  sky.add(s); shooters.push(s);
}
setInterval(spawnShooter, 4200);

/* ================================================================
   CHAPTER 2 — THE GLOBE
   ================================================================ */
const globe = new THREE.Group(); globe.visible=false; scene.add(globe);
const G_R = 10;

function latLon(lat,lon,r=G_R){
  const ph=(90-lat)*Math.PI/180, th=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(ph)*Math.cos(th), r*Math.cos(ph), r*Math.sin(ph)*Math.sin(th));
}

/* planet body — shader: deep ocean w/ subtle noise + fresnel rim */
const planet = new THREE.Mesh(
  new THREE.SphereGeometry(G_R, 64, 64),
  new THREE.ShaderMaterial({
    uniforms:{ t:{value:0} },
    vertexShader:`varying vec3 vN; varying vec3 vP;
      void main(){ vN=normalize(normalMatrix*normal); vP=(modelViewMatrix*vec4(position,1.)).xyz;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying vec3 vN; varying vec3 vP; uniform float t;
      float hash(vec3 p){ return fract(sin(dot(p,vec3(12.99,78.23,37.71)))*43758.5); }
      void main(){
        vec3 v = normalize(-vP);
        float fres = pow(1.-max(dot(vN,v),0.), 2.6);
        float n = hash(floor(vN*22.)); // faint continents-ish mottling
        vec3 deep = vec3(.03,.05,.18), land = vec3(.07,.10,.30);
        vec3 col = mix(deep, land, smoothstep(.55,.75,n));
        col += vec3(.35,.45,1.0)*fres*1.15;                 // atmosphere rim
        col += vec3(.15,.1,.35)*pow(fres,4.)*(.8+.2*sin(t)); // aurora shimmer
        gl_FragColor = vec4(col,1.);
      }`
  })
);
globe.add(planet);

/* outer atmosphere glow */
const atmo = new THREE.Mesh(new THREE.SphereGeometry(G_R*1.18, 48, 48),
  new THREE.ShaderMaterial({ side:THREE.BackSide, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
    vertexShader:`varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal);
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying vec3 vN; void main(){
      float a = pow(.62-dot(vN,vec3(0,0,1.)), 3.2);
      gl_FragColor = vec4(vec3(.45,.5,1.)*a*1.6, a);}`
  }));
globe.add(atmo);

/* country markers */
const markers = [];
LOVE.forEach((d,i)=>{
  const s = new THREE.Sprite(new THREE.SpriteMaterial({map:TEX_STAR,transparent:true,
    depthWrite:false,blending:THREE.AdditiveBlending,opacity:.85,color:0xaab6ff}));
  s.position.copy(latLon(d[5],d[6],G_R*1.02));
  s.scale.setScalar(1.1);
  s.userData={i, visited:false, ph:Math.random()*6};
  globe.add(s); markers.push(s);
});

/* arcs between visited countries */
const arcGroup = new THREE.Group(); globe.add(arcGroup);
function addArc(a,b){
  const mid = a.clone().add(b).multiplyScalar(.5).normalize().multiplyScalar(G_R*1.45);
  const curve = new THREE.QuadraticBezierCurve3(a,mid,b);
  const geo = new THREE.TubeGeometry(curve, 40, .045, 6, false);
  const mat = new THREE.MeshBasicMaterial({color:0xff8fc7, transparent:true, opacity:0,
    blending:THREE.AdditiveBlending, depthWrite:false});
  const m = new THREE.Mesh(geo,mat); arcGroup.add(m);
  gsap.to(mat,{opacity:.85,duration:1.4,ease:'power2.out'});
}

/* ================================================================
   CHAPTER 3 — FINALE HEART (particles)
   ================================================================ */
const HEART_N = isMobile?1600:3200;
const heartGeom = new THREE.BufferGeometry();
const hp = new Float32Array(HEART_N*3), hFrom = new Float32Array(HEART_N*3), hTo = new Float32Array(HEART_N*3);
for(let i=0;i<HEART_N;i++){
  const t = Math.random()*Math.PI*2;
  const x = 16*Math.pow(Math.sin(t),3);
  const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
  const sc = .55*(0.3+Math.random()*.7);
  hTo[i*3]=x*sc; hTo[i*3+1]=y*sc; hTo[i*3+2]=(Math.random()-.5)*3;
  const r=40; hFrom[i*3]=(Math.random()-.5)*r; hFrom[i*3+1]=(Math.random()-.5)*r; hFrom[i*3+2]=(Math.random()-.5)*r;
  hp[i*3]=hFrom[i*3]; hp[i*3+1]=hFrom[i*3+1]; hp[i*3+2]=hFrom[i*3+2];
}
heartGeom.setAttribute('position', new THREE.BufferAttribute(hp,3));
const heart = new THREE.Points(heartGeom, new THREE.PointsMaterial({size:.55,map:TEX_PINK,transparent:true,
  depthWrite:false,blending:THREE.AdditiveBlending,opacity:0}));
heart.visible=false; scene.add(heart);
const heartState = {mix:0, beat:0};

/* ================================================================
   AUDIO — generated ambient pad, no files
   ================================================================ */
let AC=null, master=null, muted=false;
function startAudio(){
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value=.0001; master.connect(AC.destination);
    gsap.to(master.gain,{value:.16,duration:6});
    const chord=[130.81,164.81,196.0,246.94]; // C-E-G-B, dreamy
    chord.forEach((f,i)=>{
      const o=AC.createOscillator(); o.type='sine'; o.frequency.value=f;
      const g=AC.createGain(); g.gain.value=.18;
      const lfo=AC.createOscillator(); lfo.frequency.value=.06+i*.03;
      const lg=AC.createGain(); lg.gain.value=.09;
      lfo.connect(lg); lg.connect(g.gain);
      const pan=AC.createStereoPanner?AC.createStereoPanner():null;
      o.connect(g); if(pan){g.connect(pan); pan.pan.value=(i-1.5)*.4; pan.connect(master);} else g.connect(master);
      o.start(); lfo.start();
    });
    document.getElementById('mute').style.display='flex';
  }catch(e){}
}
function chime(freq=880){
  if(!AC||muted) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='sine'; o.frequency.value=freq; g.gain.setValueAtTime(.0001,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.25,AC.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+1.6);
  o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime+1.7);
}
document.getElementById('mute').onclick = e=>{
  muted=!muted; e.target.textContent = muted?'✕':'♪';
  if(master) gsap.to(master.gain,{value:muted?0:.16,duration:.8});
  if(muted) speechSynthesis.cancel();
};

/* speech */
function speak(text, lang){
  if(muted || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = .85; u.pitch = 1.05;
  const v = speechSynthesis.getVoices().find(v=>v.lang.replace('_','-').startsWith(lang.split('-')[0]));
  if(v) u.voice = v;
  speechSynthesis.speak(u);
}
if('speechSynthesis' in window) speechSynthesis.getVoices();

/* ================================================================
   INTERACTION + STATE
   ================================================================ */
let chapter = 'INTRO';
let wishCount = 0, visitedCount = 0, lastVisited = null, finaleStarted=false;
const ray = new THREE.Raycaster();
const ptr = new THREE.Vector2(999,999);
const ptrWorld = new THREE.Vector3(0,0,-2);
let dragging=false, px=0, py=0, rotV={x:0,y:0}, moved=0;

const hint = document.getElementById('hint');
const starMsg = document.getElementById('starMsg');
const progress = document.getElementById('progress');
function showHint(t, ms=5000){ hint.textContent=t; hint.style.opacity=1;
  clearTimeout(hint._t); hint._t=setTimeout(()=>hint.style.opacity=0, ms); }

function setPointer(e){
  const x = (e.touches?e.touches[0].clientX:e.clientX);
  const y = (e.touches?e.touches[0].clientY:e.clientY);
  ptr.x = (x/innerWidth)*2-1; ptr.y = -(y/innerHeight)*2+1;
}

addEventListener('pointerdown', e=>{ dragging=true; moved=0; px=e.clientX; py=e.clientY; setPointer(e); });
addEventListener('pointermove', e=>{
  setPointer(e);
  if(dragging && chapter==='GLOBE'){
    const dx=e.clientX-px, dy=e.clientY-py; moved+=Math.abs(dx)+Math.abs(dy);
    rotV.y += dx*.00022; rotV.x += dy*.00018; px=e.clientX; py=e.clientY;
  }
});
addEventListener('pointerup', e=>{
  dragging=false;
  if(moved>8) return;             // it was a drag, not a tap
  setPointer(e);
  ray.setFromCamera(ptr, camera);
  if(chapter==='SKY') clickSky();
  else if(chapter==='GLOBE') clickGlobe();
});

function clickSky(){
  const hits = ray.intersectObjects(wishStars);
  if(!hits.length) return;
  const s = hits[0].object;
  if(s.userData.clicked) return;
  s.userData.clicked = true; wishCount++;
  chime(660+wishCount*80);
  gsap.to(s.scale,{x:5,y:5,duration:.5,yoyo:true,repeat:1,ease:'power2.out'});
  starMsg.textContent = WISHES[s.userData.i];
  starMsg.style.opacity=1; setTimeout(()=>starMsg.style.opacity=0, 4200);
  /* reveal part of the constellation */
  const per = Math.ceil(nameGroup.children.length/5);
  nameGroup.visible=true;
  nameGroup.children.slice((wishCount-1)*per, wishCount*per).forEach((sp,i)=>{
    gsap.to(sp.material,{opacity:1,duration:1.2,delay:i*.12});
  });
  if(wishCount===5) setTimeout(constellationDone, 1800);
}

function constellationDone(){
  chime(1046); chime(1318);
  showHint('You wrote your name in my sky. Now… touch the sky to see the world I'd give you.', 9000);
  addEventListener('pointerup', goGlobeOnce);
}
function goGlobeOnce(){ removeEventListener('pointerup', goGlobeOnce); toGlobe(); }

function toGlobe(){
  if(chapter!=='SKY') return;
  chapter='TRANSITION';
  speechSynthesis.cancel?.();
  gsap.to(sky.position,{z:60,duration:2.4,ease:'power3.in'});
  gsap.to(camera.position,{z:34,duration:2.4,ease:'power3.inOut', onComplete:()=>{
    sky.visible=false; globe.visible=true; chapter='GLOBE';
    globe.scale.setScalar(.001);
    gsap.to(globe.scale,{x:1,y:1,z:1,duration:2.2,ease:'elastic.out(1,.6)'});
    progress.style.opacity=1; updateProgress();
    showHint('This is Earth. Every glowing light knows how to say one thing. Tap them.', 8000);
    chime(523);
  }});
}

function updateProgress(){
  progress.textContent = `♥ ${visitedCount} / ${UNLOCK_AT} lights of love`;
}

const card = document.getElementById('card');
function clickGlobe(){
  ray.setFromCamera(ptr, camera);
  const hits = ray.intersectObjects(markers);
  if(!hits.length){ card.classList.remove('show'); return; }
  const m = hits[0].object, d = LOVE[m.userData.i];
  /* fill card */
  card.querySelector('.flag').textContent=d[1];
  card.querySelector('.cname').textContent=d[0];
  card.querySelector('.phrase').textContent=d[2];
  card.querySelector('.pron').textContent=d[3];
  card.querySelector('.trans').textContent='means · I love you';
  card.classList.add('show');
  card.querySelector('.speak').onclick=()=>speak(d[2],d[4]);
  speak(d[2],d[4]); chime(700+Math.random()*300);
  gsap.fromTo(m.scale,{x:3,y:3},{x:1.6,y:1.6,duration:.8,ease:'power2.out'});
  if(!m.userData.visited){
    m.userData.visited=true; m.material.color.set(0xff9ecb); m.material.opacity=1;
    if(lastVisited) addArc(lastVisited.position.clone(), m.position.clone());
    lastVisited = m; visitedCount++; updateProgress();
    if(visitedCount===UNLOCK_AT && !finaleStarted) setTimeout(startFinale, 2200);
  }
}

/* ================================================================
   FINALE
   ================================================================ */
async function startFinale(){
  finaleStarted=true; chapter='FINALE_SEQ';
  card.classList.remove('show'); progress.style.opacity=0;
  showHint('Listen… the whole world wants to tell you something.', 6000);
  /* world speaks: every visited language in sequence */
  const visited = markers.filter(m=>m.userData.visited).map(m=>LOVE[m.userData.i]);
  for(const d of visited){
    speak(d[2], d[4]); chime(600+Math.random()*500);
    await new Promise(r=>setTimeout(r, 2100));
  }
  /* globe collapses into the heart */
  gsap.to(globe.scale,{x:.001,y:.001,z:.001,duration:2.2,ease:'power3.in',
    onComplete:()=>{ globe.visible=false; }});
  gsap.to(camera.position,{z:38,duration:2.2,ease:'power2.inOut'});
  setTimeout(()=>{
    heart.visible=true;
    gsap.to(heart.material,{opacity:1,duration:2});
    gsap.to(heartState,{mix:1,duration:3.5,ease:'power3.inOut',onComplete:showWords});
    chapter='FINALE';
  }, 1400);
}

function showWords(){
  const f = document.getElementById('finale');
  f.style.opacity=1;
  const lines=['f1','f2','f3','f4'];
  lines.forEach((id,i)=>{
    gsap.to('#'+id,{opacity:1,y:0,duration:1.6,delay:1.5+i*2.4,ease:'power2.out',
      onStart:()=>chime(523+i*130)});
  });
  setTimeout(()=>{
    gsap.to('#finale',{opacity:0,duration:3});
    const c=document.getElementById('credits'); c.style.opacity=1;
    setTimeout(()=>gsap.to(c,{opacity:0,duration:4}), 9000);
  }, 1500+lines.length*2400+5000);
}

/* ================================================================
   RENDER LOOP
   ================================================================ */
const clock = new THREE.Clock();
function tick(){
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime(), dt = Math.min(clock.getDelta(),.05)||.016;

  if(sky.visible){
    sky.rotation.y = t*.004;
    /* pointer → world for fireflies */
    ptrWorld.set(ptr.x*16, ptr.y*10, -2);
    const p = flyGeom.attributes.position.array;
    for(let i=0;i<FLY_N;i++){
      const ix=i*3;
      flyVel[ix]   += (ptrWorld.x + Math.sin(t*1.3+i)*3 - p[ix])  *.002;
      flyVel[ix+1] += (ptrWorld.y + Math.cos(t*1.1+i*2)*2 - p[ix+1])*.002;
      flyVel[ix] *=.96; flyVel[ix+1]*=.96;
      p[ix]+=flyVel[ix]; p[ix+1]+=flyVel[ix+1];
    }
    flyGeom.attributes.position.needsUpdate = true;
    wishStars.forEach(s=>{ if(!s.userData.clicked){
      const k = s.userData.base + Math.sin(t*2+s.userData.ph)*.5; s.scale.setScalar(k); }});
    for(let i=shooters.length-1;i>=0;i--){
      const s=shooters[i]; s.position.x+=s.userData.vx; s.position.y+=s.userData.vy;
      s.userData.life-=.008; s.material.opacity=s.userData.life;
      if(s.userData.life<=0){ sky.remove(s); shooters.splice(i,1); }
    }
  }

  if(globe.visible){
    planet.material.uniforms.t.value = t;
    if(!dragging){ rotV.y += (0.0006 - rotV.y)*.02; rotV.x += (0 - rotV.x)*.02; }
    globe.rotation.y += rotV.y*60*dt*(REDUCED?.3:1);
    globe.rotation.x = THREE.MathUtils.clamp(globe.rotation.x + rotV.x*60*dt, -1.1, 1.1);
    rotV.x*=.94; rotV.y*=.95;
    markers.forEach(m=>{
      const base = m.userData.visited?1.6:1.1;
      m.scale.setScalar(base + Math.sin(t*2.4+m.userData.ph)*.22);
    });
  }

  if(heart.visible){
    heartState.beat = 1 + Math.sin(t*2.4)*.045 + Math.max(0,Math.sin(t*2.4+.4))*.05;
    const p = heartGeom.attributes.position.array, k = heartState.mix, b=heartState.beat;
    for(let i=0;i<HEART_N;i++){
      const ix=i*3;
      p[ix]  = (hFrom[ix]  +(hTo[ix]  -hFrom[ix])  *k)*b;
      p[ix+1]= (hFrom[ix+1]+(hTo[ix+1]-hFrom[ix+1])*k)*b + Math.sin(t+ i)*.06;
      p[ix+2]= (hFrom[ix+2]+(hTo[ix+2]-hFrom[ix+2])*k)*b;
    }
    heartGeom.attributes.position.needsUpdate=true;
    heart.rotation.y = Math.sin(t*.3)*.25;
  }

  renderer.render(scene, camera);
}
tick();

/* ---------- intro ---------- */
document.getElementById('enterBtn').addEventListener('click', ()=>{
  startAudio();
  const intro=document.getElementById('intro');
  intro.style.opacity=0;
  setTimeout(()=>{ intro.classList.add('hidden'); intro.classList.remove('active'); },2000);
  chapter='SKY';
  gsap.from(camera.position,{z:70,duration:3.5,ease:'power3.out'});
  setTimeout(()=>showHint('Some stars shine brighter than others. Touch the golden ones ✦',7000),2500);
});

addEventListener('resize', ()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
